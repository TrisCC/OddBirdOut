name: Deploy Showcase to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'showcase/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showcase
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: showcase/package-lock.json

      - uses: actions/configure-pages@v4

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE || '/OddBirdOut/' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: showcase/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
